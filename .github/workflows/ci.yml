name: CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-and-deploy:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    env:
      REACT_APP_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }} 

    steps:
      - name: Set build env vars
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          VERSION="$(date -u +'%Y%m%d-%H%M%SZ')-${GITHUB_SHA:0:7}"
          if [ "$BRANCH" != "main" ]; then
            VERSION="$VERSION ($BRANCH)"
          fi
          echo "REACT_APP_BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "REACT_APP_BRANCH=$BRANCH" >> $GITHUB_ENV
        
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Install dependencies with Yarn
        run: yarn install --immutable
        working-directory: app

      - name: Run tests
        run: yarn test
        working-directory: app

      # If tests pass, do a build
      - name: Build
        run: yarn build
        working-directory: app
        env:
          REACT_APP_BUILD_VERSION: ${{ env.REACT_APP_BUILD_VERSION }}
          REACT_APP_BRANCH: ${{ env.REACT_APP_BRANCH }}

      - name: Configure git user
        # This ensures gh-pages can commit with a known identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
        working-directory: app

      # Deploy only if tests & build succeeded
      - name: Deploy to GitHub Pages
        if: ${{ success() && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/build
